name: Update latest release JSON

on:
  release:
    types: [published, released, edited]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write latest-release.json
        env:
          TAG: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          ASSETS_JSON: ${{ toJson(github.event.release.assets) }}
        run: |
          APK_URL="$(jq -r '[.[] | select(.name | endswith(".apk"))][0].browser_download_url // ""' <<< "$ASSETS_JSON")"
          jq -n \
            --arg tag "$TAG" \
            --arg versionName "${TAG#v}" \
            --arg name "$NAME" \
            --arg publishedAt "$PUBLISHED_AT" \
            --arg releaseUrl "$RELEASE_URL" \
            --arg apkUrl "$APK_URL" \
            '{tag: $tag, versionName: $versionName, name: $name, publishedAt: $publishedAt, releaseUrl: $releaseUrl, apkUrl: $apkUrl}' \
            > latest-release.json

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest-release.json
          git diff --cached --quiet || git commit -m "Update latest release metadata"
          git push
